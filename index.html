    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2.5rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #fff;

    header p {
      margin-top: 0.5rem;
      color: #777;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .fractals {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .fractal-section h2 {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 0.5rem;
    }
    .fractal-section h2 a {
      color: #c8a96e;
      text-decoration: none;
    }
    .fractal-section h2 a:hover {
      color: #e8c98e;
      text-decoration: underline;
    }

    .gallery {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .gallery a {
      display: block;
      flex: 1 1 200px;
      max-width: 340px;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid #1e1e1e;
      transition: border-color 0.2s, transform 0.2s;
    }
    .gallery a:hover {
      border-color: #c8a96e;
      transform: translateY(-2px);
    }

    .gallery img {
      display: block;
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #111;
    }

    .no-renders {
      color: #444;
      font-style: italic;
      font-size: 0.9rem;
    }
  </style>
